<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus Words</title>
    <!-- Use Inter font for clean layout -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
    <div id="app-container">
        <!-- Left panel (Verse Navigator) -->
        <aside id="sidebar">
            <header class="sidebar-header">
                <h1>Jesus Words</h1>
                <div class="mode-toggle">
                    <button class="toggle-btn active" data-mode="verse">Verse View</button>
                    <button class="toggle-btn" data-mode="study">Study View</button>
                </div>
                <div class="search-container">
                    <input type="text" id="sidebar-search" placeholder="Search...">
                </div>
            </header>
            
            <div id="sidebar-content" class="sidebar-content-area scroll-container">
                <!-- Verse View -->
                <div id="view-verse" class="view-layer active">
                    <ul id="verse-list" class="item-list"></ul>
                </div>
                
                <!-- Study View: Empty Sidebar State -->
                <div id="view-study-empty" class="view-layer placeholder-state">
                    <p>Select a category from the dashboard to explore verses.</p>
                </div>

                <!-- Study View: Category Detail (Verses) -->
                <div id="view-study-detail" class="view-layer">
                    <button id="btn-back-categories" class="back-btn">&larr; Categories</button>
                    <h2 id="study-detail-title" class="study-title">Category Name</h2>
                    <ul id="study-verse-list" class="item-list"></ul>
                </div>
            </div>
        </aside>

        <!-- Main content area -->
        <main id="main-content">
            <!-- 3-Column Comparison View -->
            <div id="comparison-view" class="main-layer active">
                <div class="column">
                    <header class="column-header">DBH</header>
                    <div class="column-content" id="col-dbh">
                        <div class="placeholder-text">Select a verse to compare.</div>
                    </div>
                </div>
                
                <div class="column">
                    <header class="column-header">NRSVUE</header>
                    <div class="column-content" id="col-nrsvue"></div>
                </div>
                
                <div class="column">
                    <header class="column-header">LAMSA</header>
                    <div class="column-content" id="col-lamsa"></div>
                </div>
            </div>

            <!-- Categories Dashboard -->
            <div id="categories-dashboard" class="main-layer">
                <div class="dashboard-header">
                    <h2>Study Categories</h2>
                    <p>Select a theological theme to view all related spoken verses.</p>
                </div>
                <div id="dashboard-grid">
                    <!-- Cards injected by JS -->
                </div>
            </div>
        </main>

    </div>

    <!-- Accessibility Menu -->
    <button id="accessibility-toggle" class="acc-gear" aria-label="Accessibility Options">
        <img src="assets/icons/accessicon2.svg" alt="accessibility icon" />
    </button>
    <div id="accessibility-menu" hidden>
        <h2>Accessibility Options</h2>
        <ul>
            <!-- Options will be injected by JS -->
        </ul>
    </div>

    <!-- Dark Mode Toggle -->
    <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
        <span class="icon-wrap">
            <img class="icon-sun" src="assets/icons/sun.svg" alt="sun icon" />
            <img class="icon-moon" src="assets/icons/moon.svg" alt="moon icon" />
        </span>
    </button>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/dark-mode.js"></script>
</body>
</html>
